<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEC WiFi Voucher Login</title>

  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <div class="login-container">
    <div class="login-box">

      <!-- Logo -->
      <img src="images/ceclogo.png" alt="CEC Logo" class="logo">

      <!-- ================== PORTAL FORM ================== -->
      <!-- IMPORTANT: Must use $PORTAL_ACTION$ for Omada -->
      <form method="post" action="$PORTAL_ACTION$">

        <fieldset>
          <legend>CEC WiFi</legend>

          <!-- ================== REQUIRED HIDDEN PARAMETERS ================== -->
          <input type="hidden" name="client_mac" value="$CLIENT_MAC$">
          <input type="hidden" name="ap_mac" value="$AP_MAC$">
          <input type="hidden" name="ssid" value="$SSID$">
          <input type="hidden" name="redirect_url" value="$REDIRECT_URL$">

          <!-- ================== VOUCHER INPUT ================== -->
          <input type="text"
                 name="username"
                 placeholder="Enter Voucher Code"
                 required>

          <!-- Privacy Policy -->
          <label class="checkbox">
            <input type="checkbox" required>
            I acknowledge that I have read and understood the data privacy policy of the college.
          </label>

          <!-- Acceptable Use Policy -->
          <label class="checkbox">
            <input type="checkbox" required>
            I acknowledge that I have read and understood the acceptable use policy of the college.
          </label>

          <button type="submit">Connect</button>

        </fieldset>

      </form>

      <!-- Footer -->
      <p class="footer">
        Made with ♥ by <span>CEC IT Team</span>
      </p>

    </div>
  </div>

</body>
</html>
